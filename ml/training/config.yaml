model:
  architecture: efficientnet_b4
  pretrained: true
  num_classes: 3000
  input_size: 224
  dropout: 0.3

training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.01
  warmup_epochs: 5
  label_smoothing: 0.1

optimizer:
  name: adamw

scheduler:
  name: cosine_annealing
  min_lr: 0.00001

data:
  train_dir: ../data/train
  val_dir: ../data/val
  test_dir: ../data/test
  num_workers: 4

augmentation:
  train:
    random_horizontal_flip: true
    random_rotation: 45
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_perspective: 0.3
    gaussian_blur: 0.1
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

checkpoint:
  save_dir: ./checkpoints
  save_top_k: 3
  monitor: val_acc_top1

wandb:
  project: brickscan-lego-classifier
  entity: null
