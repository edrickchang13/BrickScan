# Alembic Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template to use to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the "build_date" directive; this value is passed to datetime.datetime.now()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of the version file
# (GUID omitted)
# by default, this value is 40
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Loggers configured:
#
# alembic
#     Controls most of alembic's behaviors such as reporting vars and logging
# sqlalchemy.engine
#     Logs all SQL statements and result sets
#
# When 'sqlalchemy.echo' is True, the general log level is set to INFO
# when 'sqlalchemy.echo' is False, the general log level is set to WARNING

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# The SQLAlchemy URL is set via environment variable
sqlalchemy.url = driver://user:password@localhost/dbname
