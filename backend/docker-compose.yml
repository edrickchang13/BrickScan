version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brickscan_user
      POSTGRES_PASSWORD: brickscan_password
      POSTGRES_DB: brickscan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brickscan_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://brickscan_user:brickscan_password@db:5432/brickscan
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REBRICKABLE_API_KEY: ${REBRICKABLE_API_KEY:-}
      BRICKLINK_CONSUMER_KEY: ${BRICKLINK_CONSUMER_KEY:-}
      BRICKLINK_CONSUMER_SECRET: ${BRICKLINK_CONSUMER_SECRET:-}
      BRICKLINK_TOKEN: ${BRICKLINK_TOKEN:-}
      BRICKLINK_TOKEN_SECRET: ${BRICKLINK_TOKEN_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ML_MODEL_PATH: /app/models/lego_classifier.onnx
      CONFIDENCE_THRESHOLD: 0.75
      S3_BUCKET: ${S3_BUCKET:-brickscan-images}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
