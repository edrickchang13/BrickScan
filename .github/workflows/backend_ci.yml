name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: brickscan_test
          POSTGRES_USER: brickscan_user
          POSTGRES_PASSWORD: brickscan_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+asyncpg://brickscan_user:brickscan_password@localhost:5432/brickscan_test
        REDIS_URL: redis://localhost:6379
      run: |
        alembic upgrade head

    - name: Run tests with pytest
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+asyncpg://brickscan_user:brickscan_password@localhost:5432/brickscan_test
        REDIS_URL: redis://localhost:6379
        ENVIRONMENT: test
      run: |
        pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy

    - name: Run Ruff linter
      working-directory: ./backend
      run: |
        ruff check app/ tests/

    - name: Run Black formatter check
      working-directory: ./backend
      run: |
        black --check app/ tests/

    - name: Run MyPy type checker
      working-directory: ./backend
      continue-on-error: true
      run: |
        mypy app/ --ignore-missing-imports
